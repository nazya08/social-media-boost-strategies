name: Trigger Vercel Cron

on:
  schedule:
    - cron: "0 */2 * * *"   # DEFAULT account
    - cron: "30 */2 * * *"  # AI_BUILDERS_LAB account
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Missing secret: CRON_URL"
            exit 1
          fi

          ACCOUNTS="DEFAULT"
          if [ "${{ github.event.schedule }}" = "30 */2 * * *" ]; then
            ACCOUNTS="AI_BUILDERS_LAB"
          fi

          URL="$CRON_URL"
          SEP="?"
          if echo "$URL" | grep -q "?"; then SEP="&"; fi

          curl -fsS "${URL}${SEP}accounts=${ACCOUNTS}" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json"
