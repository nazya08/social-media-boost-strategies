name: Trigger Vercel Cron

on:
  schedule:
    - cron: "0 */2 * * *"   # DEFAULT account
    - cron: "30 */4 * * *"  # AI_BUILDERS_LAB account
    # - cron: "15 */4 * * *"  # AI_SOLUTIONSHUB account — PAUSED 2026-05-04 (Threads API block 2207051)
    - cron: "5 */3 * * *"   # AI_GROWTHHUB247 account
    - cron: "20 */3 * * *"  # AI_DAILY247 account
    - cron: "35 */3 * * *"  # AI_DIARYLAB account
    - cron: "50 */3 * * *"  # 247AI_BUILDS account
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Missing secret: CRON_URL"
            exit 1
          fi

          ACCOUNTS="DEFAULT"
          case "${{ github.event.schedule }}" in
            "30 */4 * * *") ACCOUNTS="AI_BUILDERS_LAB" ;;
            # "15 */4 * * *") ACCOUNTS="AI_SOLUTIONSHUB" ;;  # PAUSED 2026-05-04
            "5 */3 * * *")  ACCOUNTS="AI_GROWTHHUB247" ;;
            "20 */3 * * *") ACCOUNTS="AI_DAILY247" ;;
            "35 */3 * * *") ACCOUNTS="AI_DIARYLAB" ;;
            "50 */3 * * *") ACCOUNTS="247AI_BUILDS" ;;
          esac

          URL="$CRON_URL"
          SEP="?"
          if echo "$URL" | grep -q "?"; then SEP="&"; fi

          curl -fsS "${URL}${SEP}accounts=${ACCOUNTS}" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json"
