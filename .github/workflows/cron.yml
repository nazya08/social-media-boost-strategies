name: Trigger Vercel Cron

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Missing secret: CRON_URL"
            exit 1
          fi
          curl -fsS "$CRON_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json"

