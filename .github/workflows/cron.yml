name: Trigger Vercel Cron

on:
  schedule:
    - cron: "0 */4 * * *"   # DEFAULT account
    - cron: "30 */4 * * *"  # AI_BUILDERS_LAB account
    - cron: "15 */4 * * *"  # AI_SOLUTIONSHUB account
    - cron: "45 */4 * * *"  # AI_GROWTHHUB247 account
    # - cron: "20 */3 * * *"  # AI_DAILY247 — BANNED by Threads 2026-05-11
    # - cron: "35 */3 * * *"  # AI_DIARYLAB — BANNED by Threads 2026-05-11
    # - cron: "50 */3 * * *"  # 247AI_BUILDS — BANNED by Threads 2026-05-11
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ]; then
            echo "Missing secret: CRON_URL"
            exit 1
          fi

          ACCOUNTS="DEFAULT"
          case "${{ github.event.schedule }}" in
            "30 */4 * * *") ACCOUNTS="AI_BUILDERS_LAB" ;;
            "15 */4 * * *") ACCOUNTS="AI_SOLUTIONSHUB" ;;
            "45 */4 * * *") ACCOUNTS="AI_GROWTHHUB247" ;;
            # "20 */3 * * *") ACCOUNTS="AI_DAILY247" ;;   # BANNED 2026-05-11
            # "35 */3 * * *") ACCOUNTS="AI_DIARYLAB" ;;   # BANNED 2026-05-11
            # "50 */3 * * *") ACCOUNTS="247AI_BUILDS" ;;  # BANNED 2026-05-11
          esac

          URL="$CRON_URL"
          SEP="?"
          if echo "$URL" | grep -q "?"; then SEP="&"; fi

          curl -fsS "${URL}${SEP}accounts=${ACCOUNTS}" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "content-type: application/json"
